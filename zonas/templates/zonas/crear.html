{% extends "base.html" %}
{% block title %}Crear Reserva{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">

        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-header bg-primary text-white text-center rounded-top-4">
                <h4 class="mb-0">
                    <i class="bi bi-calendar-plus me-2"></i>Crear Reserva
                </h4>
            </div>

            <div class="card-body p-4">

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Zona común</label>
                        {{ form.zona }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Fecha</label>
                        {{ form.fecha }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Hora inicio</label>
                        {{ form.hora_inicio }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Hora fin</label>
                        {{ form.hora_fin }}
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-success btn-lg rounded-3">
                            <i class="bi bi-check-circle me-2"></i>Reservar
                        </button>
                    </div>
                </form>

            </div>
        </div>

    </div>
</div>
{% endblock %}
