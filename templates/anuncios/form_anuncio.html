{% extends "base.html" %}
{% block content %}

<div class="container mt-4" style="max-width:600px;">
    <h3 class="mb-3">{{ titulo }}</h3>

    <form method="post">
        {% csrf_token %}
        
        <div class="mb-3">
            <label class="form-label">Título</label>
            {{ form.titulo }}
        </div>

        <div class="mb-3">
            <label class="form-label">Contenido</label>
            {{ form.contenido }}
        </div>

        <div class="form-check mb-3">
            {{ form.destacado }}
            <label class="form-check-label">Destacar anuncio</label>
        </div>

        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="{% url 'admin_lista_anuncios' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>

{% endblock %}
