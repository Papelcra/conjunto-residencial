{% extends "base.html" %}

{% block title %}Dashboard Seguridad{% endblock %}

{% block content %}

<div class="container py-5">

    <h2 class="mb-4 fw-bold text-center">Panel de Seguridad</h2>

    <div class="alert alert-info shadow-sm text-center">
        Bienvenido, <strong>{{ user.get_full_name|default:user.username }}</strong>
    </div>

    <!-- TARJETA CENTRAL ÚNICA -->
    <div class="row justify-content-center mt-4">

        <div class="col-lg-4 col-md-6">
            <div class="card dashboard-card shadow-lg h-100 text-center">
                <div class="card-body d-flex flex-column">

                    <div class="icon-circle bg-primary text-white mb-4">
                        <i class="bi bi-calendar-day fs-1"></i>
                    </div>

                    <h5 class="card-title">Reservas del Día</h5>
                    <p class="text-muted small">
                        Consulta las zonas comunes reservadas para hoy.
                    </p>

                    <a href="{% url 'zonas:calendario' %}" 
                       class="btn btn-primary mt-auto">
                        Ver calendario
                    </a>

                </div>
            </div>
        </div>

    </div>

</div>

<style>
.dashboard-card {
    border-radius: 16px;
    transition: all 0.3s ease;
    background: white;
}

.dashboard-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.15) !important;
}

.icon-circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
}

.btn {
    border-radius: 12px;
    padding: 10px 18px;
    font-weight: 600;
}
</style>

{% endblock %}
