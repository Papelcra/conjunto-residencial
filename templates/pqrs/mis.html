{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Mis PQRS</h3>
        <a href="{% url 'pqrs:crear_pqrs' %}" class="btn btn-warning">
            + Nueva PQRS
        </a>
    </div>

    <div class="row">
        {% for p in pqrs %}
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm h-100 border-0">
                <div class="card-header bg-light fw-bold">
                    {{ p.get_tipo_display }}
                </div>

                <div class="card-body">
                    <p><strong>Radicado:</strong> {{ p.radicado }}</p>
                    <p><strong>Asunto:</strong> {{ p.asunto }}</p>
                    <p><strong>Fecha:</strong> {{ p.fecha_creacion|date:"d/m/Y" }}</p>
                </div>

                <div class="card-footer">
                    <span class="badge 
                        {% if p.estado == 'PENDIENTE' %} bg-warning
                        {% else %} bg-success {% endif %}">
                        {{ p.estado }}
                    </span>
                </div>
            </div>
        </div>
        {% empty %}
            <p class="text-muted">No has enviado PQRS aún.</p>
        {% endfor %}
    </div>
</div>

{% endblock %}
