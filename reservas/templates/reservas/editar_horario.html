{% extends "base.html" %}

{% block title %}Editar Horario{% endblock %}

{% block content %}
<div class="container mt-5">
    <h2 class="mb-4">Editar Horario de {{ horario.zona.nombre }}</h2>

    <form method="post">
        {% csrf_token %}
        <div class="row g-3">
            <div class="col-md-4">
                <label>Día</label>
                <select name="dia_semana" class="form-control" required>
                    <option value="lunes" {% if horario.dia_semana == 'lunes' %}selected{% endif %}>Lunes</option>
                    <option value="martes" {% if horario.dia_semana == 'martes' %}selected{% endif %}>Martes</option>
                    <option value="miercoles" {% if horario.dia_semana == 'miercoles' %}selected{% endif %}>Miércoles</option>
                    <option value="jueves" {% if horario.dia_semana == 'jueves' %}selected{% endif %}>Jueves</option>
                    <option value="viernes" {% if horario.dia_semana == 'viernes' %}selected{% endif %}>Viernes</option>
                    <option value="sabado" {% if horario.dia_semana == 'sabado' %}selected{% endif %}>Sábado</option>
                    <option value="domingo" {% if horario.dia_semana == 'domingo' %}selected{% endif %}>Domingo</option>
                </select>
            </div>
            <div class="col-md-4">
                <label>Hora inicio</label>
                <input type="time" name="hora_inicio" class="form-control" value="{{ horario.hora_inicio }}" required>
            </div>
            <div class="col-md-4">
                <label>Hora fin</label>
                <input type="time" name="hora_fin" class="form-control" value="{{ horario.hora_fin }}" required>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-success">Guardar cambios</button>
                <a href="{% url 'reservas:gestionar_horarios' horario.zona.id %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
