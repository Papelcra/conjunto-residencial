{% extends "base.html" %}
{% block content %}

<div class="container mt-4">
    <div class="card shadow">
        <div class="card-body">

            <h3 class="mb-4">Asignar Arrendatario</h3>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="apartamento" class="form-label">Apartamento</label>
                    <select name="apartamento" id="apartamento" class="form-select" required>
                    <option value="">Seleccione un apartamento...</option>
                    {% for apto in apartamentos %}
                        <option value="{{ apto.id }}"
                                {% if apto.estado == 'desocupado' %}class="text-success"{% endif %}
                                {% if apto.estado == 'en_venta' %}class="text-info"{% endif %}
                                {% if apto.estado == 'en_obra_mantenimiento' %}class="text-warning"{% endif %}>
                            {{ apto.identificador }}
                            {% if apto.bloque_o_torre %} - {{ apto.bloque_o_torre }}{% endif %}
                            {% if apto.piso %} (Piso {{ apto.piso }}){% endif %}
                            - {{ apto.get_estado_display }}
                        </option>
                    {% empty %}
                        <option value="">No hay apartamentos disponibles</option>
                    {% endfor %}
                </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Residente</label>
                    <select name="residente" class="form-select" required>
                        <option value="">Seleccione...</option>
                        {% for user in residentes %}
                            <option value="{{ user.id }}">
                                {{ user.get_full_name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="{% url 'arrendatarios:lista' %}" class="btn btn-secondary">
                        Cancelar
                    </a>
                    <button type="submit" class="btn btn-success">
                        Guardar
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>

{% endblock %}
